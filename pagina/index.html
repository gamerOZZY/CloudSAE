<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión — SAE ESCOM</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    /* =============================================
       1. VARIABLES CSS (Paleta de Identidad)
       ============================================= */
    :root {
      --wine-dark:   #62152d;   
      --wine-mid:    #952f57;   
      --wine-light:  #ca668b;   
      --black-deep:  #040404;   
      --black-soft:  #0f0f0f;   

      --surface-0:   #080306;
      --surface-1:   #120710;
      --surface-2:   #1c0d18;
      --surface-3:   #2a1422;

      --text-primary:   #f2e8ec;
      --text-secondary: #c9a0b2;
      --text-muted:     #7a5060;
      --wine-pale:      #e8c0cf;

      --border-faint:  rgba(202, 102, 139, 0.12);
      --border-soft:   rgba(202, 102, 139, 0.25);
      --border-strong: rgba(202, 102, 139, 0.45);
      --glass-bg:      rgba(18, 7, 16, 0.55);
      --glass-glow:    rgba(149, 47, 87, 0.15);

      --ease: cubic-bezier(0.4, 0, 0.2, 1);
      --fast:   200ms;
      --normal: 340ms;
      --slow:   500ms;
      --ultra-slow: 800ms;
    }

    /* =============================================
       2. RESET & BASE
       ============================================= */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100vh;
      overflow: hidden;
      font-family: 'DM Sans', sans-serif;
      background-color: var(--black-deep);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
    }

    /* =============================================
       3. FONDO ANIMADO
       ============================================= */
    .background-wrapper {
      position: absolute;
      inset: -30%;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 0;
      transform: rotate(-12deg) scale(1.1);
      pointer-events: none;
    }

    .bg-grid {
      display: flex;
      gap: 2vw;
      width: 100%;
      height: 100%;
    }

    .bg-column {
      display: flex;
      flex-direction: column;
      gap: 2vw;
      width: 25vw;
      animation: scroll-column 40s linear infinite;
    }

    .bg-column:nth-child(even) {
      animation-direction: reverse;
    }

    .bg-card {
      width: 100%;
      height: 35vh;
      background: linear-gradient(135deg, var(--surface-2), var(--surface-0));
      border: 1px solid var(--border-faint);
      border-radius: 16px;
      opacity: 0.3;
      transition: opacity var(--slow) var(--ease);
      position: relative;
      overflow: hidden;
    }

    .bg-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 100% 0%, var(--wine-dark) 0%, transparent 60%);
      opacity: 0.4;
    }

    @keyframes scroll-column {
      0% { transform: translateY(0); }
      100% { transform: translateY(-50%); }
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, transparent 0%, var(--black-deep) 80%);
      z-index: 1;
      pointer-events: none;
    }

    /* =============================================
       4. INTERFAZ PRINCIPAL
       ============================================= */
    .main-container {
      position: relative;
      z-index: 10;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      perspective: 1000px;
    }

    .login-card {
      width: 100%;
      max-width: 480px; /* Un poco más ancho para los 4 botones */
      background: var(--glass-bg);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--border-soft);
      border-top: 1px solid var(--border-strong);
      border-left: 1px solid var(--border-strong);
      border-radius: 28px;
      padding: 48px 40px;
      box-shadow: 
        0 40px 80px rgba(0,0,0,0.8), 
        inset 0 0 40px var(--glass-glow);
      
      opacity: 0;
      transform: translateY(40px) rotateX(10deg);
      animation: form-enter 1s var(--ease) 0.2s forwards;
    }

    @keyframes form-enter {
      to {
        opacity: 1;
        transform: translateY(0) rotateX(0);
      }
    }

    .login-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      margin-bottom: 24px;
    }

    .logo-mark {
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, var(--wine-dark), var(--wine-mid));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 24px;
      font-weight: 700;
      color: var(--wine-pale);
      box-shadow: 0 8px 24px rgba(98, 21, 45, 0.45);
      margin-bottom: 16px;
    }

    .login-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 36px;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    .login-subtitle {
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 300;
      margin-top: 8px;
    }

    /* =============================================
       5. SELECTOR DE 4 ROLES (SEGMENTED CONTROL)
       ============================================= */
    .role-selector {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
      background: var(--surface-3);
      padding: 6px;
      border-radius: 12px;
      margin-bottom: 36px;
      border: 1px solid var(--border-soft);
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.4);
    }

    .role-option {
      cursor: pointer;
      position: relative;
    }

    .role-option input {
      display: none; /* Ocultar el radio button real */
    }

    .role-text {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px 4px;
      font-size: 11.5px;
      font-weight: 500;
      color: var(--text-muted);
      border-radius: 8px;
      transition: all var(--fast) var(--ease);
      text-align: center;
      user-select: none;
    }

    /* Hover cuando no está seleccionado */
    .role-option:hover input:not(:checked) + .role-text {
      background: var(--surface-2);
      color: var(--text-primary);
    }

    /* Estado Activo */
    .role-option input:checked + .role-text {
      background: linear-gradient(135deg, var(--wine-mid), var(--wine-dark));
      color: var(--wine-pale);
      box-shadow: 0 4px 12px rgba(98, 21, 45, 0.5);
      border: 1px solid var(--wine-light);
    }

    /* =============================================
       6. FORMULARIO
       ============================================= */
    .form-group {
      position: relative;
      margin-bottom: 32px;
    }

    .form-input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border-strong);
      padding: 12px 0;
      font-size: 15px;
      color: var(--text-primary);
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color var(--normal) var(--ease);
    }

    .form-input::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 0;
      height: 2px;
      background: var(--wine-light);
      transition: width var(--normal) var(--ease);
    }

    .form-label {
      position: absolute;
      top: 12px;
      left: 0;
      font-size: 15px;
      color: var(--text-muted);
      pointer-events: none;
      transition: all var(--normal) var(--ease);
    }

    .form-input:focus ~ .form-label,
    .form-input:not(:placeholder-shown) ~ .form-label {
      top: -12px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--wine-light);
    }

    .form-input:focus {
      border-bottom-color: var(--wine-light);
    }

    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 36px;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .checkbox-group input {
      display: none;
    }

    .custom-checkbox {
      width: 16px;
      height: 16px;
      border: 1px solid var(--border-strong);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--fast) var(--ease);
    }

    .checkbox-group input:checked + .custom-checkbox {
      background: var(--wine-mid);
      border-color: var(--wine-light);
    }

    .custom-checkbox svg {
      width: 10px;
      height: 10px;
      stroke: var(--wine-pale);
      stroke-width: 3;
      fill: none;
      opacity: 0;
      transform: scale(0.5);
      transition: all var(--fast) var(--ease);
    }

    .checkbox-group input:checked + .custom-checkbox svg {
      opacity: 1;
      transform: scale(1);
    }

    .checkbox-label {
      font-size: 12px;
      color: var(--text-secondary);
      font-weight: 400;
    }

    .forgot-link {
      font-size: 12px;
      color: var(--wine-light);
      text-decoration: none;
      font-weight: 500;
      transition: color var(--fast) var(--ease);
    }

    .forgot-link:hover {
      color: var(--wine-pale);
      text-shadow: 0 0 8px var(--glass-glow);
    }

    .btn-submit {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--wine-mid), var(--wine-dark));
      border: 1px solid var(--border-soft);
      border-radius: 14px;
      color: var(--wine-pale);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      overflow: hidden;
      position: relative;
      transition: all var(--normal) var(--ease);
      box-shadow: 0 8px 24px rgba(98, 21, 45, 0.3);
    }

    .btn-submit::before {
      content: '';
      position: absolute;
      top: 0; left: -100%; width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
      transition: left var(--slow) var(--ease);
    }

    .btn-submit:hover {
      background: linear-gradient(135deg, var(--wine-light), var(--wine-mid));
      color: var(--black-deep);
      box-shadow: 0 12px 32px rgba(202, 102, 139, 0.4);
      transform: translateY(-2px);
    }

    .btn-submit:hover::before {
      left: 100%;
    }

    .btn-submit:active {
      transform: translateY(0) scale(0.98);
    }

    .btn-submit.loading {
      color: transparent;
      pointer-events: none;
    }

    .btn-submit.loading::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      width: 20px; height: 20px;
      margin: -10px 0 0 -10px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: var(--wine-pale);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* =============================================
       7. RESPONSIVE DESIGN
       ============================================= */
    @media (max-width: 768px) {
      .bg-column { width: 40vw; }
      .login-card { padding: 40px 24px; border-radius: 20px; }
      .login-title { font-size: 30px; }
    }

    @media (max-width: 480px) {
      .background-wrapper { transform: rotate(-5deg) scale(1.2); }
      .bg-column { width: 60vw; }
      .main-container { padding: 16px; }
      .login-card { padding: 32px 16px; backdrop-filter: blur(16px); }
      
      /* Adaptar la cuadrícula de roles a 2 filas x 2 columnas en celulares */
      .role-selector {
        grid-template-columns: repeat(2, 1fr);
        gap: 6px;
      }
      .role-text { font-size: 12px; padding: 12px 4px; }
      
      .form-options { flex-direction: column; align-items: flex-start; gap: 16px; }
    }

    /* =============================================
       8. POPUP DE ERROR
       ============================================= */
    .popup-overlay {
      position: fixed;
      inset: 0;
      background: rgba(4, 4, 4, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 100;
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      visibility: hidden;
      transition: all var(--normal) var(--ease);
      padding: 24px;
    }

    .popup-overlay.show {
      opacity: 1;
      visibility: visible;
    }

    .popup-card {
      background: var(--surface-1);
      border: 1px solid var(--border-strong);
      border-radius: 24px;
      padding: 40px 32px;
      max-width: 380px;
      width: 100%;
      text-align: center;
      box-shadow: 
        0 40px 80px rgba(0,0,0,0.9), 
        inset 0 0 30px var(--glass-glow);
      transform: translateY(30px) scale(0.95);
      transition: all var(--normal) var(--ease);
    }

    .popup-overlay.show .popup-card {
      transform: translateY(0) scale(1);
    }

    .popup-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 24px auto;
      background: rgba(202, 102, 139, 0.1);
      border: 1px solid var(--wine-mid);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--wine-light);
    }

    .popup-icon svg {
      width: 32px;
      height: 32px;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .popup-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      color: var(--text-primary);
      margin-bottom: 12px;
      line-height: 1.2;
    }

    .popup-message {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 32px;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <div class="background-wrapper" id="bgWrapper">
    </div>
  
  <div class="overlay"></div>

  <main class="main-container" id="mainContainer">
    <div class="login-card" id="loginCard">
      
      <div class="login-header">
        <div class="logo-mark">IPN</div>
        <h1 class="login-title">Bienvenido a SAE</h1>
        <p class="login-subtitle">Sistema de Administración Escolar</p>
      </div>

      <div class="role-selector">
        <label class="role-option">
          <input type="radio" name="role" value="alumno" checked>
          <span class="role-text">Alumno</span>
        </label>
        <label class="role-option">
          <input type="radio" name="role" value="profesor">
          <span class="role-text">Profesor</span>
        </label>
        <label class="role-option">
          <input type="radio" name="role" value="gestor">
          <span class="role-text">Gestor</span>
        </label>
        <label class="role-option">
          <input type="radio" name="role" value="directivo">
          <span class="role-text">Administrativo</span>
        </label>
      </div>

      <form id="loginForm" action="login.php" method="POST">
        <input type="hidden" id="selectedRole" name="role" value="alumno">
        <div class="form-group">
          <input type="text" id="username" name="username" class="form-input" placeholder=" " required autocomplete="off">
          <label for="username" class="form-label" id="usernameLabel">Boleta o Correo Institucional</label>
        </div>

        <div class="form-group">
          <input type="password" id="password" name="password" class="form-input" placeholder=" " required>
          <label for="password" class="form-label">Contraseña</label>
        </div>

        <div class="form-options">
          <label class="checkbox-group">
            <input type="checkbox" id="remember">
            <div class="custom-checkbox">
              <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
            </div>
            <span class="checkbox-label">Recordar mis datos</span>
          </label>
          <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">
          <span id="btnText">Iniciar Sesión →</span>
        </button>

      </form>

    </div>
    <div class="popup-overlay" id="errorPopup">
    <div class="popup-card">
      <div class="popup-icon">
        <svg viewBox="0 0 24 24">
          <path d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
        </svg>
      </div>
      <h2 class="popup-title">Autenticación Fallida</h2>
      <p class="popup-message" id="errorMessage">Ha ocurrido un error al iniciar sesión.</p>
      <button class="btn-submit" id="closePopupBtn">Intentar de nuevo</button>
    </div>
  </div>
  </main>
  

  <script>
    
    document.querySelectorAll('input[name="role"]').forEach(radio => {
    radio.addEventListener('change', () => {
        document.getElementById('selectedRole').value = radio.value;
    });
    });

    document.addEventListener('DOMContentLoaded', () => {
      
      /* 1. Generación dinámica del fondo */
      const bgWrapper = document.getElementById('bgWrapper');
      const columnsCount = 5;
      const cardsPerColumn = 6; 
      
      const grid = document.createElement('div');
      grid.className = 'bg-grid';

      for (let i = 0; i < columnsCount; i++) {
        const col = document.createElement('div');
        col.className = 'bg-column';
        
        for (let j = 0; j < cardsPerColumn; j++) {
          const card = document.createElement('div');
          card.className = 'bg-card';
          const randomHeight = Math.floor(Math.random() * (45 - 25 + 1)) + 25; 
          card.style.height = `${randomHeight}vh`;
          col.appendChild(card);
        }
        col.innerHTML += col.innerHTML; 
        grid.appendChild(col);
      }
      bgWrapper.appendChild(grid);

      /* 2. Parallax Suave */
      const loginCard = document.getElementById('loginCard');
      const mainContainer = document.getElementById('mainContainer');

      mainContainer.addEventListener('mousemove', (e) => {
        const xAxis = (window.innerWidth / 2 - e.pageX) / 40;
        const yAxis = (window.innerHeight / 2 - e.pageY) / 40;
        loginCard.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg) translateY(0)`;
      });

      mainContainer.addEventListener('mouseleave', () => {
        loginCard.style.transform = `rotateY(0deg) rotateX(0deg) translateY(0)`;
        loginCard.style.transition = `transform 0.5s cubic-bezier(0.4, 0, 0.2, 1)`;
      });

      mainContainer.addEventListener('mouseenter', () => {
        loginCard.style.transition = `none`;
      });

      /* 3. Lógica del Selector de 4 Roles */
      const roleInputs = document.querySelectorAll('input[name="role"]');
      const usernameLabel = document.getElementById('usernameLabel');

      roleInputs.forEach(input => {
        input.addEventListener('change', (e) => {
          const selectedRole = e.target.value;
          
          // Cambiamos el placeholder/label flotante según quién inicie sesión
          switch(selectedRole) {
            case 'alumno':
              usernameLabel.textContent = 'Boleta o Correo Institucional';
              break;
            case 'profesor':
              usernameLabel.textContent = 'No. de Empleado o Correo Institucional';
              break;
            case 'gestor':
              usernameLabel.textContent = 'ID de Gestor o Correo Institucional';
              break;
            case 'directivo':
              usernameLabel.textContent = 'No. de Nómina o Correo Institucional';
              break;
          }
        });
      });



    });
    /* 4. Lógica del Popup de Errores */
      const urlParams = new URLSearchParams(window.location.search);
      const errorType = urlParams.get('error');
      
      if (errorType) {
        const errorPopup = document.getElementById('errorPopup');
        const errorMessage = document.getElementById('errorMessage');

        // Personalizar el mensaje según el error
        if (errorType === 'user_not_found') {
          errorMessage.textContent = 'El usuario ingresado no existe en nuestros registros.';
        } else if (errorType === 'wrong_password') {
          errorMessage.textContent = 'La contraseña es incorrecta. Por favor, verifica tus datos.';
        }

        // Mostrar el popup con una pequeña pausa para la animación
        setTimeout(() => {
          errorPopup.classList.add('show');
        }, 100);

        // Limpiar la URL para que no vuelva a salir el popup al recargar la página
        window.history.replaceState({}, document.title, window.location.pathname);
      }

      // Cerrar el popup
      document.getElementById('closePopupBtn').addEventListener('click', () => {
        const errorPopup = document.getElementById('errorPopup');
        errorPopup.classList.remove('show');
      });

  </script>
  

</body>
</html>
